name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: TypeScript and Biome
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript
        run: npm run typecheck

      - name: Run Biome
        run: npm run lint
